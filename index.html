<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0A0A0A"/>
<title>Aluna V3.3 — Edição de Ouro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   ALUNA V3.3 — FIX DE MOVIMENTO TOTAL
   Propriedade: GRUPO AGEA COMERCIAL
═══════════════════════════════════════════════ */
:root {
  --black:#0A0A0A; --gold:#F0A500; --yellow:#FFD700; --white:#F5F5F0; 
  --muted:#777; --border:rgba(255,255,255,0.08); --radius:14px;
  --font-display:'Bebas Neue', sans-serif; --font-body:'Outfit', sans-serif;
}

/* ── CORREÇÃO RADICAL DE SCROLL ── */
html, body { 
  margin:0; padding:0; width:100%; 
  height:100%; 
  /* Impedimos que a página inteira balance, mas deixamos o conteúdo interno livre */
  overflow: hidden; 
  background:var(--black); color:var(--white);
  font-family:var(--font-body);
  position: fixed; /* Evita o "pulo" da barra de endereços no mobile */
}

#app {
  width: 100vw;
  max-width: 480px; 
  margin: 0 auto; 
  height: 100dvh; 
  display: flex; 
  flex-direction: column; 
  position: relative; 
  z-index: 1;
  background: var(--black);
}

/* ── ÁREA DE CONTEÚDO (O MOTOR DO SCROLL) ── */
.scroll-area { 
  flex: 1; 
  /* Libertação total do deslize vertical */
  overflow-y: scroll !important; 
  -webkit-overflow-scrolling: touch !important; 
  touch-action: pan-y !important; /* Força o navegador a aceitar o deslize do dedo */
  padding: 20px;
  padding-bottom: 100px; /* Margem extra para não prender no fundo */
}

#bg-layer {
  position:fixed; inset:0; z-index:0; 
  background-size:cover; background-position:center;
  transition:background 1s ease-in-out;
}

/* ── UI FIXA (CABEÇALHO E RODAPÉ) ── */
.app-header {
  padding: env(safe-area-inset-top) 20px 15px; 
  background:rgba(10,10,10,0.9); backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.1); 
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.logo-mark { font-family:var(--font-display); font-size:32px; color:var(--gold); }

.app-nav { 
  display:flex; background:rgba(17,17,17,0.9); border-bottom:1px solid var(--border);
  flex-shrink:0; 
}
.nav-item {
  flex:1; padding:15px; font-size:11px; font-weight:700; text-transform:uppercase;
  color:var(--muted); border:none; background:none; cursor:pointer;
  border-bottom:2px solid transparent;
}
.nav-item.active { color:var(--gold); border-bottom-color:var(--gold); }

.app-footer { 
  padding:15px; text-align:center; background:rgba(10,10,10,0.95); 
  border-top:1px solid var(--border); flex-shrink:0;
}
.footer-sign { font-family:var(--font-display); font-size:12px; color:var(--gold); letter-spacing:2px; }

/* ── CARDS ── */
.card {
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); 
  backdrop-filter:blur(15px); padding:20px; border-radius:var(--radius); margin-bottom:15px;
}
.screen { display:none; }
.screen.active { display:block; }

</style>
</head>
<body>

<div id="bg-layer"></div>

<div id="app">
  <header class="app-header">
    <div>
      <div class="logo-mark">ALUNA</div>
      <div style="font-size:9px; color:var(--muted); letter-spacing:2px;">GRUPO AGEA COMERCIAL</div>
    </div>
    <div style="background:rgba(240,165,0,0.1); border:1px solid var(--gold); padding:6px 14px; border-radius:20px; color:var(--gold); font-weight:800;">💰 0 Kz</div>
  </header>

  <nav class="app-nav">
    <button class="nav-item active" onclick="switchScreen('home', this)">Início</button>
    <button class="nav-item" onclick="switchScreen('battle', this)">Batalha</button>
    <button class="nav-item" onclick="switchScreen('admin', this)">Admin</button>
  </nav>

  <main class="scroll-area">
    <section id="screen-home" class="screen active">
      <div class="card">
        <h2 style="font-family:var(--font-display); font-size:24px; color:var(--gold);">Teste de Movimento</h2>
        <p style="color:var(--muted); font-size:14px; margin-top:5px;">O scroll deve estar totalmente livre agora. Deslize para baixo.</p>
      </div>
      
      <div class="card" style="height:200px; display:flex; align-items:center; justify-content:center;">Conteúdo de Teste 1</div>
      <div class="card" style="height:200px; display:flex; align-items:center; justify-content:center;">Conteúdo de Teste 2</div>
      <div class="card" style="height:200px; display:flex; align-items:center; justify-content:center;">Conteúdo de Teste 3</div>
      <div class="card" style="height:200px; display:flex; align-items:center; justify-content:center;">Fim da Lista</div>
    </section>

    <section id="screen-battle" class="screen">
      <div class="card" style="text-align:center;">
        <h2 style="font-family:var(--font-display);">Arenas</h2>
        <button style="width:100%; padding:15px; margin-top:10px; background:var(--gold); border:none; border-radius:8px; font-weight:800;">Entrar na Batalha</button>
      </div>
    </section>

    <section id="screen-admin" class="screen">
      <div class="card"><h2>Configurações</h2></div>
    </section>
  </main>

  <footer class="app-footer">
    <div class="footer-sign">GRUPO AGEA COMERCIAL | CEO ADELINO GRAÇA</div>
  </footer>
</div>

<script>
function switchScreen(screenId, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const target = document.getElementById('screen-' + screenId);
  if(target) {
    target.classList.add('active');
    btn.classList.add('active');
  }
}
</script>
</body>
</html>
