<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ALUNA V6 — Grupo Agea Comercial</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Rajdhani:wght@300;400;500;600;700&display=swap');
:root{--noir:#050505;--noir2:#0a0a0a;--noir3:#111111;--noir4:#1a1a1a;--noir5:#222222;--gold:#D4AF37;--gold2:#F0D060;--gold3:#B8960C;--gold4:#8B6914;--platinum:#E8E8E8;--silver:#A8A8A8;--red:#C0392B;--red2:#E74C3C;--green:#1A7A4A;--green2:#27AE60;--blue:#1A3A5C;--white:#FAFAFA;--trans:all .3s cubic-bezier(.4,0,.2,1);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--noir);font-family:'Rajdhani',sans-serif;color:var(--white);}
#sparkCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.state{display:none;position:fixed;inset:0;z-index:10;overflow-y:auto;overflow-x:hidden;}
.state.active{display:flex;flex-direction:column;}

/* PRELOADER */
#state-preloader{align-items:center;justify-content:center;background:var(--noir);flex-direction:column;gap:32px;}
.preloader-ring{width:120px;height:120px;position:relative;}
.preloader-ring svg{width:100%;height:100%;animation:ringR 2s linear infinite;}
@keyframes ringR{to{transform:rotate(360deg)}}
.preloader-ring svg circle{fill:none;stroke:var(--gold);stroke-width:2;stroke-dasharray:300;stroke-dashoffset:80;stroke-linecap:round;}
.preloader-logo-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:28px;font-weight:900;color:var(--gold);letter-spacing:4px;}
.preloader-title{font-family:'Cinzel',serif;font-size:14px;letter-spacing:8px;color:var(--silver);text-transform:uppercase;}
.preloader-bar-wrap{width:200px;height:2px;background:var(--noir4);border-radius:1px;overflow:hidden;}
.preloader-bar{height:100%;width:0;background:linear-gradient(90deg,var(--gold3),var(--gold2));transition:width .05s linear;}
.preloader-msg{font-size:11px;letter-spacing:3px;color:var(--gold4);text-transform:uppercase;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* TICKER */
.ticker-wrap{width:100%;overflow:hidden;background:var(--noir4);border-bottom:1px solid var(--gold4);padding:6px 0;flex-shrink:0;z-index:20;position:relative;}
.ticker-inner{display:inline-flex;white-space:nowrap;animation:tickA 30s linear infinite;}
@keyframes tickA{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{font-size:11px;letter-spacing:2px;color:var(--gold);padding:0 32px;font-weight:500;}
.ticker-sep{color:var(--gold4);}

/* HEADER */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:rgba(5,5,5,.95);border-bottom:1px solid rgba(212,175,55,.15);flex-shrink:0;z-index:20;position:relative;}
.header-logo{font-family:'Cinzel',serif;font-size:20px;font-weight:900;color:var(--gold);letter-spacing:3px;cursor:pointer;user-select:none;position:relative;}
.header-logo::after{content:'V6';position:absolute;top:-6px;right:-22px;font-size:9px;color:var(--gold3);letter-spacing:1px;}
.header-bal{display:flex;align-items:center;gap:6px;background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.2);border-radius:20px;padding:6px 14px;}
.header-bal-icon{font-size:12px;color:var(--gold);}
.header-bal-val{font-size:14px;font-weight:700;color:var(--gold2);letter-spacing:1px;}
/* Balance split indicator */
.bal-split{display:flex;gap:4px;font-size:8px;letter-spacing:1px;margin-top:1px;}
.bal-real{color:var(--gold2);}
.bal-bonus{color:var(--blue);opacity:.7;}

/* PLATINUM CARD */
.platinum-card{margin:20px 16px;background:linear-gradient(135deg,#1a1a1a 0%,#0d0d0d 40%,#1f1a0a 70%,#0a0a0a 100%);border-radius:16px;padding:24px;border:1px solid rgba(212,175,55,.3);position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6),inset 0 1px 0 rgba(212,175,55,.1);flex-shrink:0;}
.platinum-card::before{content:'';position:absolute;top:-40%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,rgba(212,175,55,.06) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.card-brand{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;color:var(--gold3);}
.card-type{font-size:10px;letter-spacing:3px;color:var(--silver);}
.card-chip{width:36px;height:28px;border-radius:4px;background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));position:relative;overflow:hidden;}
.card-chip::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(0,0,0,.3);}
.card-chip::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(0,0,0,.3);}
.card-holo{width:32px;height:32px;border-radius:4px;background:linear-gradient(45deg,#ff006688,#0066ff88,#00ff6688,#ff006688);background-size:300% 300%;animation:holo 3s ease infinite;opacity:.7;}
@keyframes holo{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.card-balance-label{font-size:10px;letter-spacing:3px;color:var(--silver);margin-bottom:4px;}
.card-balance-val{font-family:'Cinzel',serif;font-size:28px;font-weight:700;color:var(--gold2);letter-spacing:2px;}
.card-balance-val span{font-size:13px;color:var(--gold4);margin-left:4px;}
.card-balance-split{display:flex;gap:12px;margin-top:6px;font-size:10px;letter-spacing:1px;}
.card-split-real{color:var(--gold2);}
.card-split-bonus{color:#5BA3E0;}
.card-footer{display:flex;justify-content:space-between;align-items:flex-end;margin-top:16px;}
.card-id{font-size:11px;letter-spacing:2px;color:var(--gold4);}
.card-id-val{font-size:13px;letter-spacing:3px;color:var(--silver);margin-top:2px;}
.card-actions{display:flex;gap:8px;}
.card-btn{padding:6px 12px;border-radius:20px;font-size:10px;letter-spacing:2px;font-weight:600;cursor:pointer;border:none;transition:var(--trans);font-family:'Rajdhani',sans-serif;}
.card-btn-dep{background:linear-gradient(135deg,var(--gold3),var(--gold));color:var(--noir);}
.card-btn-lev{background:transparent;color:var(--gold3);border:1px solid var(--gold4);}

/* HOME */
#state-home{background:var(--noir);}
.home-scroll{flex:1;overflow-y:auto;padding-bottom:80px;}
.section-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;color:var(--gold4);text-transform:uppercase;padding:0 20px 12px;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 16px 20px;}
.stat-card{background:var(--noir3);border:1px solid rgba(212,175,55,.1);border-radius:10px;padding:14px 10px;text-align:center;}
.stat-val{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold2);}
.stat-lbl{font-size:9px;letter-spacing:2px;color:var(--silver);margin-top:2px;}

/* HERO BUTTONS */
.hero-actions{padding:16px 16px 8px;display:flex;flex-direction:column;gap:12px;}
.hero-btn{width:100%;border:none;border-radius:14px;padding:22px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:var(--trans);position:relative;overflow:hidden;}
.hero-btn:active{transform:scale(.97);}
.hero-btn-compete{background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));box-shadow:0 4px 24px rgba(212,175,55,.35);}
.hero-btn-free{background:linear-gradient(135deg,#1A3A5C,#234E78,#2D6494);border:1px solid rgba(212,175,55,.25);}
.hero-btn-icon{font-size:28px;flex-shrink:0;}
.hero-btn-text{text-align:left;}
.hero-btn-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;letter-spacing:2px;line-height:1.2;}
.hero-btn-compete .hero-btn-title{color:var(--noir);}
.hero-btn-free .hero-btn-title{color:var(--gold2);}
.hero-btn-sub{font-size:10px;letter-spacing:1px;margin-top:2px;}
.hero-btn-compete .hero-btn-sub{color:rgba(5,5,5,.7);}
.hero-btn-free .hero-btn-sub{color:rgba(255,255,255,.6);}
.hero-btn-badge{position:absolute;top:8px;right:12px;font-size:8px;letter-spacing:2px;font-weight:700;padding:3px 8px;border-radius:10px;}
.hero-btn-compete .hero-btn-badge{background:rgba(5,5,5,.15);color:var(--noir);}
.hero-btn-free .hero-btn-badge{background:rgba(212,175,55,.15);color:var(--gold);}
.free-mode-bar{display:none;align-items:center;justify-content:center;gap:8px;padding:6px 0;background:rgba(26,58,92,.3);border-bottom:1px solid rgba(45,100,148,.4);font-size:10px;letter-spacing:2px;color:#5BA3E0;flex-shrink:0;}
.free-mode-bar.active{display:flex;}

/* SECONDARY */
.secondary-section{padding:0 16px 20px;}
.secondary-toggle{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;cursor:pointer;border-radius:10px;background:var(--noir3);border:1px solid rgba(212,175,55,.06);margin-bottom:10px;}
.secondary-toggle-lbl{font-size:11px;letter-spacing:2px;color:var(--silver);}
.secondary-toggle-arrow{font-size:10px;color:var(--gold4);transition:transform .3s;}
.secondary-toggle.open .secondary-toggle-arrow{transform:rotate(180deg);}
.secondary-grid{display:none;grid-template-columns:1fr 1fr;gap:10px;}
.secondary-grid.open{display:grid;}
.secondary-grid .qa-btn{opacity:.7;border-color:rgba(212,175,55,.06);}
.qa-btn{background:var(--noir3);border:1px solid rgba(212,175,55,.12);border-radius:12px;padding:16px;display:flex;flex-direction:column;align-items:flex-start;gap:8px;cursor:pointer;transition:var(--trans);}
.qa-btn:active{transform:scale(.97);}
.qa-icon{font-size:22px;}
.qa-label{font-size:12px;font-weight:600;letter-spacing:1px;color:var(--white);}
.qa-sub{font-size:10px;color:var(--silver);}

/* LEADERBOARD */
.leaderboard{padding:0 16px 24px;}
.lb-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;background:var(--noir3);margin-bottom:8px;border:1px solid rgba(212,175,55,.06);}
.lb-rank{font-family:'Cinzel',serif;font-size:16px;font-weight:700;width:24px;text-align:center;}
.lb-rank.gold{color:var(--gold);}
.lb-rank.silver{color:var(--silver);}
.lb-rank.bronze{color:#CD7F32;}
.lb-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold4),var(--gold3));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--noir);flex-shrink:0;}
.lb-info{flex:1;}
.lb-name{font-size:13px;font-weight:600;}
.lb-pts{font-size:10px;color:var(--gold4);letter-spacing:1px;}
.lb-val{font-family:'Cinzel',serif;font-size:14px;color:var(--gold2);font-weight:700;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(5,5,5,.97);border-top:1px solid rgba(212,175,55,.15);display:flex;align-items:center;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom));}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;cursor:pointer;transition:var(--trans);border-radius:8px;min-width:56px;}
.nav-item.active .nav-icon,.nav-item.active .nav-lbl{color:var(--gold);}
.nav-icon{font-size:20px;color:var(--silver);transition:var(--trans);}
.nav-lbl{font-size:9px;letter-spacing:1px;color:var(--silver);}

/* SALAS */
#state-salas{background:var(--noir);}
.salas-scroll{flex:1;overflow-y:auto;padding:20px 16px 80px;}
.salas-header{text-align:center;padding:16px 20px 24px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;color:var(--gold4);}
.sala-card{background:var(--noir3);border-radius:14px;border:1px solid rgba(212,175,55,.12);padding:20px;margin-bottom:12px;cursor:pointer;transition:var(--trans);display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;}
.sala-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold3),var(--gold4));border-radius:3px 0 0 3px;}
.sala-card:active{transform:scale(.98);}
.sala-card.locked{opacity:.5;cursor:not-allowed;}
.sala-card.locked::after{content:'🔒';position:absolute;top:12px;right:12px;font-size:14px;}
.sala-icon{font-size:32px;}
.sala-info{flex:1;}
.sala-name{font-family:'Cinzel',serif;font-size:14px;font-weight:600;margin-bottom:2px;}
.sala-desc{font-size:11px;color:var(--silver);letter-spacing:1px;}
.sala-players{font-size:10px;color:var(--gold4);margin-top:4px;}
.sala-prize{text-align:right;}
.sala-prize-val{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold2);}
.sala-prize-lbl{font-size:9px;letter-spacing:2px;color:var(--silver);}

/* LOBBY */
#state-lobby{background:var(--noir);align-items:center;justify-content:center;flex-direction:column;}
.lobby-inner{width:100%;max-width:360px;padding:20px;text-align:center;}
.lobby-title{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:3px;margin-bottom:8px;}
.lobby-sub{font-size:12px;letter-spacing:3px;color:var(--silver);margin-bottom:32px;}
.lobby-countdown{font-family:'Cinzel',serif;font-size:80px;font-weight:900;color:var(--gold2);line-height:1;margin-bottom:8px;text-shadow:0 0 40px rgba(212,175,55,.4);transition:all .3s;}
/* FASE 3: Pulsação neon nos últimos 5s */
.lobby-countdown.critical{color:var(--red2);text-shadow:0 0 60px rgba(231,76,60,.8),0 0 120px rgba(231,76,60,.4);animation:cdPulse .5s ease infinite;}
@keyframes cdPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.lobby-cd-lbl{font-size:10px;letter-spacing:4px;color:var(--silver);margin-bottom:24px;}
.lobby-players{background:var(--noir3);border:1px solid rgba(212,175,55,.1);border-radius:12px;padding:16px;margin-bottom:16px;}
.lobby-players-title{font-size:10px;letter-spacing:3px;color:var(--gold4);margin-bottom:12px;}
.lobby-list{display:flex;flex-direction:column;gap:6px;max-height:140px;overflow:hidden;}
.lobby-player{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:6px;background:rgba(212,175,55,.04);animation:plIn .3s ease;}
@keyframes plIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.lobby-player-dot{width:8px;height:8px;border-radius:50%;background:var(--green2);flex-shrink:0;animation:dotB 1.5s ease infinite;}
@keyframes dotB{0%,100%{opacity:1}50%{opacity:.3}}
.lobby-player-name{font-size:12px;font-weight:600;flex:1;text-align:left;}
.lobby-player-badge{font-size:9px;letter-spacing:1px;color:var(--gold4);background:rgba(212,175,55,.08);padding:2px 6px;border-radius:10px;}
/* FASE 3: Pote dinâmico */
.lobby-pot{background:linear-gradient(135deg,rgba(212,175,55,.12),rgba(212,175,55,.04));border:1px solid rgba(212,175,55,.3);border-radius:14px;padding:16px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden;}
.lobby-pot::after{content:'';position:absolute;inset:0;background:linear-gradient(45deg,transparent,rgba(212,175,55,.1),transparent);animation:potShine 2s ease infinite;}
@keyframes potShine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.lobby-pot-lbl{font-size:9px;letter-spacing:3px;color:var(--gold4);}
.lobby-pot-val{font-family:'Cinzel',serif;font-size:32px;font-weight:900;color:var(--gold2);transition:all .5s;text-shadow:0 0 20px rgba(212,175,55,.4);}
.lobby-pot-val.grow{animation:potGrow .6s ease;}
@keyframes potGrow{0%{transform:scale(1)}50%{transform:scale(1.2);text-shadow:0 0 40px rgba(212,175,55,.8)}100%{transform:scale(1)}}
/* ADS OVERLAY */
.lobby-ad{display:none;background:var(--noir3);border:1px solid rgba(212,175,55,.1);border-radius:12px;padding:12px;margin-bottom:16px;text-align:center;position:relative;}
.lobby-ad.active{display:block;}
.lobby-ad-partner{font-size:9px;letter-spacing:2px;color:var(--gold4);margin-bottom:4px;}
.lobby-ad-content{border-radius:8px;overflow:hidden;position:relative;}
.lobby-ad-content img,.lobby-ad-content video{width:100%;border-radius:8px;}
.lobby-ad-skip{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);color:var(--white);border:none;border-radius:12px;padding:4px 10px;font-size:9px;cursor:pointer;}

/* JOGO */
#state-jogo{background:var(--noir);flex-direction:column;}
.jogo-header{padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(212,175,55,.1);flex-shrink:0;}
.jogo-progress{flex:1;height:3px;background:var(--noir4);border-radius:2px;overflow:hidden;}
.jogo-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold2));border-radius:2px;transition:width .5s ease;}
.jogo-qnum{font-size:11px;letter-spacing:2px;color:var(--silver);white-space:nowrap;}
.jogo-score-hdr{font-family:'Cinzel',serif;font-size:14px;color:var(--gold2);font-weight:700;white-space:nowrap;}
.jogo-body{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;}
.jogo-timer-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:24px;}
.jogo-timer-ring{width:80px;height:80px;position:relative;flex-shrink:0;transition:all .3s;}
.jogo-timer-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.jogo-timer-ring svg circle{fill:none;stroke-width:4;stroke-linecap:round;}
.jogo-timer-ring svg .bg{stroke:var(--noir4);}
.jogo-timer-ring svg .fg{stroke:var(--gold);stroke-dasharray:220;transition:stroke-dashoffset .9s linear,stroke .3s;}
.jogo-timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gold);transition:all .3s;}
/* FASE 3: Timer pulsing neon */
.timer-critical .jogo-timer-num{color:var(--red2);text-shadow:0 0 20px rgba(231,76,60,.8);}
.timer-critical .jogo-timer-ring svg .fg{stroke:var(--red2);}
.timer-critical .jogo-timer-ring{animation:timerPulse .5s ease infinite;}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15);filter:drop-shadow(0 0 12px rgba(231,76,60,.6))}}
.timer-alert .jogo-timer-num{color:#F39C12;}
.jogo-categoria{font-size:10px;letter-spacing:3px;color:var(--gold4);text-align:center;margin-bottom:16px;text-transform:uppercase;}
.jogo-pergunta{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;line-height:1.5;text-align:center;color:var(--white);margin-bottom:28px;flex:1;}
.opcoes{display:flex;flex-direction:column;gap:10px;}
.opcao{background:var(--noir3);border:1px solid rgba(212,175,55,.12);border-radius:12px;padding:16px 18px;cursor:pointer;transition:var(--trans);display:flex;align-items:center;gap:12px;user-select:none;}
.opcao:active:not(.disabled){transform:scale(.98);}
.opcao.disabled{pointer-events:none;}
.opcao-letra{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gold4);transition:var(--trans);}
.opcao-texto{font-size:14px;font-weight:500;line-height:1.3;}
.opcao.correct{background:rgba(26,122,74,.2);border-color:var(--green2);}
.opcao.correct .opcao-letra{background:var(--green2);color:var(--white);border-color:var(--green2);}
.opcao.wrong{background:rgba(192,57,43,.2);border-color:var(--red2);}
.opcao.wrong .opcao-letra{background:var(--red2);color:var(--white);border-color:var(--red2);}
/* FASE 3: First-to-action badge */
.speed-badge{font-size:9px;color:var(--gold);letter-spacing:1px;margin-left:auto;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* RESULTADO */
#state-resultado{background:var(--noir);align-items:center;justify-content:center;flex-direction:column;}
.resultado-inner{width:100%;max-width:360px;padding:32px 20px;text-align:center;}
.resultado-emoji{font-size:72px;margin-bottom:16px;animation:bounceIn .6s ease;}
@keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.resultado-titulo{font-family:'Cinzel',serif;font-size:28px;font-weight:900;color:var(--gold);letter-spacing:3px;margin-bottom:8px;}
.resultado-sub{font-size:13px;color:var(--silver);margin-bottom:32px;lett
