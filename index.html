<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ALUNA V6 — Grupo Agea Comercial</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Rajdhani:wght@300;400;500;600;700&display=swap');
:root{--noir:#050505;--noir2:#0a0a0a;--noir3:#111111;--noir4:#1a1a1a;--noir5:#222222;--gold:#D4AF37;--gold2:#F0D060;--gold3:#B8960C;--gold4:#8B6914;--platinum:#E8E8E8;--silver:#A8A8A8;--red:#C0392B;--red2:#E74C3C;--green:#1A7A4A;--green2:#27AE60;--blue:#1A3A5C;--white:#FAFAFA;--trans:all .3s cubic-bezier(.4,0,.2,1);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--noir);font-family:'Rajdhani',sans-serif;color:var(--white);}
#sparkCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.state{display:none;position:fixed;inset:0;z-index:10;overflow-y:auto;overflow-x:hidden;}
.state.active{display:flex;flex-direction:column;}

/* DESIGN EDITORIAL (FASE 2) */
.editorial-content{padding:40px 24px 100px; max-width:800px; margin:0 auto; font-family:'Cormorant Garamond',serif;}
.editorial-title{font-family:'Cinzel',serif; font-size:24px; color:var(--gold); text-align:center; margin-bottom:32px; letter-spacing:4px;}
.editorial-section{margin-bottom:40px; line-height:1.8; font-size:18px; color:var(--platinum); text-align:justify;}
.editorial-section h2{font-family:'Cinzel',serif; font-size:14px; color:var(--gold3); margin-bottom:16px; letter-spacing:2px; border-bottom:1px solid rgba(212,175,55,0.2); padding-bottom:8px;}
.quote-box{border-left:2px solid var(--gold); padding-left:20px; font-style:italic; margin:24px 0; color:var(--gold2);}

/* PRELOADER */
#state-preloader{align-items:center;justify-content:center;background:var(--noir);flex-direction:column;gap:32px;}
.preloader-ring{width:120px;height:120px;position:relative;}
.preloader-ring svg{width:100%;height:100%;animation:ringR 2s linear infinite;}
@keyframes ringR{to{transform:rotate(360deg)}}
.preloader-ring svg circle{fill:none;stroke:var(--gold);stroke-width:2;stroke-dasharray:300;stroke-dashoffset:80;stroke-linecap:round;}
.preloader-logo-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:28px;font-weight:900;color:var(--gold);letter-spacing:4px;}
.preloader-title{font-family:'Cinzel',serif;font-size:14px;letter-spacing:8px;color:var(--silver);text-transform:uppercase;}
.preloader-bar-wrap{width:200px;height:2px;background:var(--noir4);border-radius:1px;overflow:hidden;}
.preloader-bar{height:100%;width:0;background:linear-gradient(90deg,var(--gold3),var(--gold2));transition:width .05s linear;}
.preloader-msg{font-size:11px;letter-spacing:3px;color:var(--gold4);text-transform:uppercase;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* HEADER */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:rgba(5,5,5,.95);border-bottom:1px solid rgba(212,175,55,.15);flex-shrink:0;z-index:20;position:relative;}
.header-logo{font-family:'Cinzel',serif;font-size:20px;font-weight:900;color:var(--gold);letter-spacing:3px;cursor:pointer;}
.header-bal{display:flex;align-items:center;gap:6px;background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.2);border-radius:20px;padding:6px 14px;}
.header-bal-val{font-size:14px;font-weight:700;color:var(--gold2);letter-spacing:1px;}

/* HOME */
.platinum-card{margin:20px 16px;background:linear-gradient(135deg,#1a1a1a 0%,#0d0d0d 40%,#1f1a0a 70%,#0a0a0a 100%);border-radius:16px;padding:24px;border:1px solid rgba(212,175,55,0.3);position:relative;overflow:hidden;}
.card-balance-val{font-family:'Cinzel',serif;font-size:28px;font-weight:700;color:var(--gold2);letter-spacing:2px;}
.hero-actions{padding:16px;display:flex;flex-direction:column;gap:12px;}
.hero-btn{width:100%;border:none;border-radius:14px;padding:22px;cursor:pointer;transition:var(--trans);display:flex;align-items:center;gap:14px;}
.hero-btn-compete{background:linear-gradient(135deg,var(--gold3),var(--gold));}
.hero-btn-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;letter-spacing:2px;color:var(--noir);}

/* TIMER PULSATION (FASE 3) */
.timer-critical{animation:timerPulse 0.5s ease infinite;}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15); filter:drop-shadow(0 0 12px var(--red2));}}

/* MODO DEUS (FASE 4) */
#state-admin{background:var(--noir2); padding:20px;}
.admin-tab{display:none; flex-direction:column; gap:15px;}
.admin-tab.active{display:flex;}
.admin-nav{display:flex; gap:10px; margin-bottom:20px; overflow-x:auto;}
.admin-nav-btn{padding:8px 16px; background:var(--noir4); border:1px solid var(--gold4); color:var(--white); cursor:pointer; font-family:'Cinzel',serif; font-size:10px;}
.admin-nav-btn.active{background:var(--gold); color:var(--noir);}
textarea{background:var(--noir3); color:var(--white); border:1px solid var(--gold4); padding:10px; border-radius:8px;}

/* FOOTER BRANDING (FASE 2) */
.footer-brand{text-align:center; padding:20px; border-top:1px solid rgba(212,175,55,0.1); margin-top:auto;}
.footer-brand-text{font-family:'Cinzel',serif; font-size:9px; letter-spacing:4px; color:var(--gold4); text-transform:uppercase;}

</style>
</head>
<body>

<canvas id="sparkCanvas"></canvas>

<div id="state-preloader" class="state active">
    <div class="preloader-ring">
        <svg><circle cx="60" cy="60" r="50"></circle></svg>
        <div class="preloader-logo-inner">A</div>
    </div>
    <div class="preloader-title">ALUNA V6</div>
    <div class="preloader-bar-wrap"><div id="preloaderBar" class="preloader-bar"></div></div>
    <div id="preloaderMsg" class="preloader-msg">A INICIALIZAR...</div>
</div>

<div id="state-home" class="state">
    <header class="app-header">
        <div class="header-logo" onclick="goTo('home')">ALUNA</div>
        <div class="header-bal">
            <span class="header-bal-val" id="headerBal">0 Kz</span>
        </div>
    </header>
    
    <div class="platinum-card">
        <div style="font-size:10px; letter-spacing:3px; color:var(--silver);">SALDO TOTAL</div>
        <div class="card-balance-val" id="cardBal">0<span>Kz</span></div>
        <div style="display:flex; gap:15px; margin-top:10px; font-size:11px;">
            <span style="color:var(--gold2)">Real: <b id="balReal">0</b></span>
            <span style="color:var(--blue)">Bónus: <b id="balBonus">0</b></span>
        </div>
    </div>

    <div class="hero-actions">
        <button class="hero-btn hero-btn-compete" onclick="goTo('salas')">
            <div class="hero-btn-text">
                <div class="hero-btn-title">JOGAR PARA COMPETIR</div>
                <div style="font-size:10px; color:rgba(0,0,0,0.6)">Ganha prémios em Kwanzas reais</div>
            </div>
        </button>
        <button class="hero-btn" style="background:var(--noir3); border:1px solid var(--gold4);" onclick="startFreeMode()">
            <div class="hero-btn-text">
                <div class="hero-btn-title" style="color:var(--white)">JOGAR GRATUITAMENTE</div>
                <div style="font-size:10px; color:var(--silver)">Treina as tuas habilidades</div>
            </div>
        </button>
    </div>

    <div class="footer-brand">
        <div class="footer-brand-text">Grupo Agea Comercial</div>
    </div>
</div>

<div id="state-admin" class="state">
    <div class="editorial-title">MODO DEUS</div>
    <div class="admin-nav">
        <button class="admin-nav-btn active" onclick="setTab(0)">CURADORIA IA</button>
        <button class="admin-nav-btn" onclick="setTab(1)">MONETIZAÇÃO</button>
        <button class="admin-nav-btn" onclick="setTab(2)">ANÚNCIOS</button>
    </div>

    <div id="tab-0" class="admin-tab active">
        <div style="font-size:11px; color:var(--gold4); margin-bottom:5px;">SYSTEM PROMPT GEMINI</div>
        <textarea id="aiPrompt" rows="4">Gera perguntas de lógica e cultura geral sobre Angola. Usa gírias de Luanda moderadamente.</textarea>
        <button class="hero-btn hero-btn-compete" style="padding:10px; margin-top:10px;" onclick="generateAIQuestions()">GERAR PERGUNTAS AGORA</button>
        <div id="aiQueue" style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
            </div>
    </div>
    <button class="hero-btn" style="margin-top:auto; background:var(--noir4);" onclick="goTo('home')">VOLTAR</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// --- CONFIGURAÇÃO SUPABASE (V6) ---
const SUPABASE_URL = 'https://enojfnwarrroaobxurrl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVub2pmbndhcnJyb2FvYnh1cnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjMxMjMsImV4cCI6MjA5MTEzOTEyM30.x0iTVooX8wdsAhwdcH6oHMnngIH49uHuEGNnPZbrHog';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// --- CONFIGURAÇÃO GEMINI AI (V6) ---
// Adelino, a tua chave foi inserida aqui conforme solicitado:
let GEMINI_API_KEY = 'AIzaSyCoth_Ax9jPH_FVx4b87jl2C54STwgIUjc';
const GEMINI_MODEL = 'gemini-1.5-flash';

const APP = {
    userId: '',
    balanceReal: 0,
    balanceBonus: 0,
    referralCode: '',
    currentState: 'preloader'
};

function goTo(stateId) {
    document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
    document.getElementById('state-' + stateId).classList.add('active');
    APP.currentState = stateId;
}

// INTEGRAÇÃO GEMINI (FASE 5)
async function generateAIQuestions() {
    if(!GEMINI_API_KEY) return alert("Insere a API Key no código primeiro!");
    const btn = event.target;
    btn.textContent = "A GERAR...";
    btn.disabled = true;

    const promptText = document.getElementById('aiPrompt').value;
    const finalPrompt = `${promptText}. Devolve apenas um array JSON com 3 objetos contendo: category, question, options (array de 4), correct_index (0-3), context_tag.`;

    try {
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
        });
        const json = await resp.json();
        const text = json.candidates[0].content.parts[0].text;
        const cleanJson = text.replace(/```json|```/g, '');
        const questions = JSON.parse(cleanJson);

        // Enviar para a Curadoria no Supabase
        for(let q of questions) {
            await db.from('ai_questions_bank').insert({
                category: q.category,
                question: q.question,
                options: q.options,
                correct_index: q.correct_index,
                context_tag: q.context_tag,
                status: 'pending'
            });
        }
        alert("Perguntas geradas e enviadas para Curadoria!");
        loadAIQueue();
    } catch(e) {
        console.error(e);
        alert("Erro ao falar com o Gemini.");
    } finally {
        btn.textContent = "GERAR PERGUNTAS AGORA";
        btn.disabled = false;
    }
}

async function loadAIQueue() {
    const {data} = await db.from('ai_questions_bank').select('*').eq('status','pending');
    const container = document.getElementById('aiQueue');
    container.innerHTML = '';
    if(data) {
        data.forEach(q => {
            const div = document.createElement('div');
            div.style.padding = "10px"; div.style.background = "var(--noir4)";
            div.innerHTML = `
                <div style="font-size:12px; color:var(--gold)">${q.question}</div>
                <button onclick="reviewQ(${q.id}, 'approved')" style="color:var(--green)">✓</button>
                <button onclick="reviewQ(${q.id}, 'rejected')" style="color:var(--red)">X</button>
            `;
            container.appendChild(div);
        });
    }
}

async function reviewQ(id, action) {
    await db.rpc('rpc_review_ai_question', { p_question_id: id, p_action: action });
    loadAIQueue();
}

// BOOT (FASE 1)
(async function boot(){
    const bar = document.getElementById('preloaderBar');
    const msg = document.getElementById('preloaderMsg');
    
    try {
        bar.style.width = '30%';
        msg.textContent = 'A CONECTAR AO SUPABASE...';
        
        let uid = localStorage.getItem('aluna_uid') || 'U-' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('aluna_uid', uid);
        APP.userId = uid;

        bar.style.width = '60%';
        msg.textContent = 'A SINCRONIZAR SALDOS V6...';
        
        const {data, error} = await db.rpc('rpc_register_player_v6', { p_user_id: uid });
        
        if(data) {
            APP.balanceReal = data.balance_real || 0;
            APP.balanceBonus = data.balance_bonus || 0;
            APP.referralCode = data.referral_code || '';
        }

        bar.style.width = '100%';
        msg.textContent = 'BEM-VINDO, CEO';
        
        setTimeout(() => {
            document.getElementById('headerBal').textContent = (APP.balanceReal + APP.balanceBonus) + ' Kz';
            document.getElementById('balReal').textContent = APP.balanceReal;
            document.getElementById('balBonus').textContent = APP.balanceBonus;
            goTo('home');
        }, 800);

    } catch(e) {
        console.error(e);
        msg.textContent = 'ERRO DE CONEXÃO. TENTE NOVAMENTE.';
    }
})();

function setTab(idx) {
    document.querySelectorAll('.admin-tab').forEach((t, i) => {
        t.classList.toggle('active', i === idx);
    });
    document.querySelectorAll('.admin-nav-btn').forEach((b, i) => {
        b.classList.toggle('active', i === idx);
    });
}
</script>
</body>
</html>
