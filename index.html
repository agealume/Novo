
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0A0A0A"/>
<title>Aluna — Conhecimento · Poder · Vitória</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   ALUNA V3.1 — CSS FOUNDATION (LUXO PREMIUM)
═══════════════════════════════════════════════ */
:root{
  --black:#0A0A0A;--surface:#111111;--surface2:#181818;--surface3:#222222;--surface4:#2A2A2A;
  --gold:#F0A500;--yellow:#FFD700;--gold-dim:rgba(240,165,0,.15);
  --red:#CC1A1A;--red-dim:rgba(204,26,26,.15);
  --green:#00C97F;--green-dim:rgba(0,201,127,.15);
  --white:#F5F5F0;--muted:#777;--border:#252525;
  --radius:14px;--radius-sm:10px;--radius-lg:20px;--radius-xl:28px;
  --shadow-gold:0 0 30px rgba(240,165,0,.25);
  --shadow-red:0 0 30px rgba(204,26,26,.25);
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'Outfit',sans-serif;
  --ease-bounce:cubic-bezier(.34,1.56,.64,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
}

/* ── RESET ABSOLUTO (VIEWPORT FIX — ZERO GAP) ── */
html,body{
  margin:0;padding:0;
  /* PROTOCOL: VIEWPORT FIX — ancora a base, impede bounce do browser */
  position:fixed;
  overflow:hidden;
  height:100%;
  width:100%;
  font-size:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:var(--font-body);background:var(--black);color:var(--white);
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
  touch-action:none; /* impede que o browser tente mover a página */
}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--black);}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px;}
img{display:block;max-width:100%;}
input,select,textarea,button{font-family:var(--font-body);}

/* ══ REANIMAÇÃO ANTI-TELA PRETA V5.8 ══ */
#app, #app-root, .main-container {
  display: block !important;
  opacity: 1 !important;
  visibility: visible !important;
  pointer-events: auto !important;
}

/* ── APP SHELL ── */
/* V4.0 LAYER ISOLATION: z-index:100 garante que o #app está sempre
   acima do #bg-layer (z-index:1) e nunca colapsa para 0px */
#app{
  max-width:480px;margin:0 auto;
  height:100dvh;
  width:100%;
  background:var(--black);
  position:relative;
  z-index:100;
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:background 1s ease-in-out;
}

/* ── BG LAYER (V4.0) ── */
#bg-layer{
  position:fixed;inset:0;
  z-index:1;
  pointer-events:none;
  transition:background 1s ease-in-out;
}

/* ── ANTI-TELA PRETA: SPLASH SKELETON CSS PURO ──
   Visível instantaneamente antes de qualquer JS.
   JS remove-o assim que está pronto. */
#app-skeleton{
  position:absolute;inset:0;z-index:10;
  background:var(--black);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity .4s ease-out;
}
#app-skeleton.fade-out{opacity:0;pointer-events:none;}
.skel-logo{
  font-family:'Bebas Neue',sans-serif;font-size:90px;letter-spacing:10px;
  background:linear-gradient(135deg,#FFD700,#F0A500,#c87800);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:screenIn .6s cubic-bezier(.16,1,.3,1);
}
.skel-sub{
  font-size:11px;color:#777;letter-spacing:4px;text-transform:uppercase;
  margin-top:6px;opacity:.7;font-family:'Outfit',sans-serif;
}
.skel-dots{margin-top:36px;display:flex;gap:8px;}
.skel-sign{
  margin-top:56px;font-size:10px;color:#444;letter-spacing:2px;
  font-family:'Bebas Neue',sans-serif;
}

/* ── SCREENS ── */
.screen{display:none;flex:1;flex-direction:column;animation:screenIn .3s var(--ease-out);overflow:hidden;}
.screen.active{display:flex;}
@keyframes screenIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* PROTOCOL: TOUCH-ACTION + INDEPENDENT SCROLL
   Única zona que faz scroll; touch-action liberta o pan vertical nativo */
.scroll-area{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:20px 20px 100px;
  /* Liberta o deslize vertical para o browser nativo */
  touch-action:pan-y !important;
  -webkit-overflow-scrolling:touch !important;
  overscroll-behavior:contain;
  /* Garante que o elemento tem a sua própria camada de composição */
  will-change:scroll-position;
  -webkit-transform:translateZ(0);
  transform:translateZ(0);
}

/* ── HEADER (V3.1 — topo perfeito no mobile) ── */
.app-header{
  position:sticky;top:0;z-index:100;
  padding:14px 20px;margin-top:0;
  background:linear-gradient(180deg,rgba(10,10,10,.98) 0%,rgba(10,10,10,.92) 100%);
  border-bottom:1px solid rgba(240,165,0,.2);
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;
  /* Glassmorphism V3.1 */
  box-shadow:0 2px 30px rgba(0,0,0,.5);
}
.logo-mark{
  font-family:var(--font-display);font-size:30px;letter-spacing:3px;
  background:linear-gradient(135deg,var(--yellow) 0%,var(--gold) 60%,#c87800 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;
}
.logo-sub{font-size:8px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:1px;}
.balance-pill{
  background:rgba(24,24,24,.8);
  border:1px solid rgba(240,165,0,.4);border-radius:24px;
  padding:7px 14px;font-size:12px;font-weight:700;color:var(--gold);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}

/* ── NAV BAR ── */
.app-nav{
  display:flex;background:rgba(17,17,17,.95);border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;backdrop-filter:blur(10px);
}
.app-nav::-webkit-scrollbar{height:0;}
.nav-item{
  flex:0 0 auto;padding:12px 14px;font-size:10px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;border:none;background:none;color:var(--muted);cursor:pointer;
  white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;position:relative;
}
.nav-item.active{color:var(--gold);border-bottom-color:var(--gold);}
.nav-item:hover:not(.active){color:var(--white);}

/* ── FOOTER BAR ── */
.app-footer{
  background:rgba(17,17,17,.97);border-top:1px solid var(--border);
  padding:12px 20px;text-align:center;flex-shrink:0;
}
.footer-brand{font-family:var(--font-display);font-size:14px;letter-spacing:2px;color:var(--gold);}
.footer-contact{font-size:10px;color:var(--muted);margin-top:2px;}
.footer-moto{
  font-size:11px;color:rgba(245,245,240,.6);margin-top:6px;font-style:italic;
  min-height:16px;transition:opacity .5s;
}
.footer-sign{
  font-size:9px;letter-spacing:2px;color:rgba(240,165,0,.5);
  text-transform:uppercase;margin-top:5px;font-family:var(--font-display);
}

/* ── CARDS (V3.1 — Glassmorphism reforçado) ── */
.card{
  background:rgba(24,24,24,.85);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:var(--radius);padding:20px;margin-bottom:14px;
  box-shadow:0 4px 24px rgba(0,0,0,.3);
}
.card-gold{border-color:rgba(240,165,0,.35);background:rgba(20,16,0,.85);}
.card-red{border-color:rgba(204,26,26,.35);background:rgba(20,0,0,.85);}
.card-green{border-color:rgba(0,201,127,.25);background:rgba(0,20,12,.85);}
.card-glass{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.card-glow{box-shadow:var(--shadow-gold);}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:15px 24px;border-radius:var(--radius-sm);font-family:var(--font-body);
  font-weight:700;font-size:14px;cursor:pointer;border:none;
  transition:transform .15s var(--ease-bounce),box-shadow .2s,background .2s;
  width:100%;letter-spacing:.3px;position:relative;overflow:hidden;user-select:none;
}
.btn::after{
  content:'';position:absolute;inset:0;background:rgba(255,255,255,.12);
  opacity:0;transition:opacity .15s;
}
.btn:active{transform:scale(.96);}
.btn:active::after{opacity:1;}
.btn-gold{
  background:linear-gradient(135deg,var(--yellow) 0%,var(--gold) 50%,#d48f00 100%);
  color:var(--black);font-weight:800;
  box-shadow:0 4px 20px rgba(240,165,0,.3);
}
.btn-gold:hover{box-shadow:0 6px 30px rgba(240,165,0,.5);}
.btn-red{background:linear-gradient(135deg,var(--red),#8B0000);color:var(--white);box-shadow:0 4px 20px rgba(204,26,26,.3);}
.btn-red:hover{box-shadow:0 6px 30px rgba(204,26,26,.5);}
.btn-green{background:linear-gradient(135deg,var(--green),#00855A);color:var(--black);font-weight:800;}
.btn-green:hover{box-shadow:0 6px 30px rgba(0,201,127,.4);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--white);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-edu{
  background:linear-gradient(135deg,#0d2b1a,#185c35);
  border:1px solid rgba(0,201,127,.4);color:var(--green);font-weight:800;
  box-shadow:0 4px 16px rgba(0,201,127,.2);
}
.btn-edu:hover{box-shadow:0 6px 24px rgba(0,201,127,.4);}
.btn-sm{padding:9px 16px;font-size:12px;width:auto;border-radius:8px;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}

/* ── INPUTS ── */
.field{margin-bottom:14px;}
.field-label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);
  text-transform:uppercase;margin-bottom:6px;display:block;}
.field-input{
  width:100%;background:rgba(34,34,34,.9);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:13px 16px;color:var(--white);
  font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;
}
.field-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,165,0,.1);}
select.field-input option{background:var(--surface3);}
textarea.field-input{resize:none;}

/* ── BADGE ── */
.badge{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
}
.badge-gold{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(240,165,0,.25);}
.badge-red{background:var(--red-dim);color:#FF7070;border:1px solid rgba(204,26,26,.25);}
.badge-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,201,127,.25);}
.badge-muted{background:var(--surface3);color:var(--muted);border:1px solid var(--border);}

/* ── SECTION TITLE ── */
.sec-title{font-family:var(--font-display);font-size:22px;letter-spacing:2px;color:var(--white);margin-bottom:3px;}
.sec-sub{font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5;}

/* ── STATS GRID ── */
.stats-grid{display:grid;gap:10px;margin-bottom:16px;}
.stats-grid-3{grid-template-columns:repeat(3,1fr);}
.stats-grid-2{grid-template-columns:repeat(2,1fr);}
.stat-box{
  background:rgba(24,24,24,.8);border:1px solid rgba(255,255,255,.07);
  border-radius:var(--radius-sm);padding:14px;text-align:center;
  backdrop-filter:blur(12px);
}
.stat-val{font-family:var(--font-display);font-size:26px;color:var(--gold);line-height:1;}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}

/* ── PROGRESS BAR ── */
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:8px 0;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--yellow));border-radius:3px;transition:width .6s var(--ease-out);}

/* ── INVITE BOX ── */
.invite-box{
  background:linear-gradient(135deg,rgba(13,13,0,.9),rgba(26,18,0,.9));
  border:1px solid rgba(240,165,0,.4);
  border-radius:var(--radius);padding:18px;margin-bottom:14px;
  backdrop-filter:blur(12px);
}
.invite-code{
  background:rgba(10,10,0,.8);border:1.5px dashed rgba(240,165,0,.5);border-radius:var(--radius-sm);
  padding:12px 16px;font-family:var(--font-display);font-size:22px;letter-spacing:5px;
  color:var(--yellow);text-align:center;cursor:pointer;margin:10px 0;
  transition:all .2s;
}
.invite-code:hover{border-color:var(--gold);box-shadow:var(--shadow-gold);}

/* ── BET CHIPS ── */
.bet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.chip{
  background:rgba(34,34,34,.8);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:11px 6px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;
  color:var(--white);transition:all .2s var(--ease-bounce);user-select:none;
  backdrop-filter:blur(8px);
}
.chip:hover{border-color:var(--gold);transform:translateY(-2px);}
.chip.on{border-color:var(--gold);background:rgba(240,165,0,.15);color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 12px rgba(240,165,0,.2);}

/* ── ROOM SELECTOR (V3.1) ── */
.room-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.room-card{
  background:rgba(20,0,0,.8);border:1.5px solid rgba(204,26,26,.3);
  border-radius:var(--radius-sm);padding:14px;text-align:center;cursor:pointer;
  transition:all .2s var(--ease-bounce);backdrop-filter:blur(8px);
}
.room-card:hover{border-color:var(--red);transform:translateY(-2px);}
.room-card.on{border-color:var(--gold);background:rgba(240,165,0,.1);box-shadow:0 4px 16px rgba(240,165,0,.2);}
.room-card .room-num{font-family:var(--font-display);font-size:32px;color:var(--gold);}
.room-card .room-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.room-card .room-prize{font-size:11px;color:var(--green);margin-top:4px;font-weight:700;}

/* ── QUESTION CARD ── */
.q-card{
  background:linear-gradient(135deg,rgba(24,24,24,.9),rgba(22,15,0,.9));
  border:2px solid rgba(240,165,0,.5);border-radius:var(--radius-lg);
  padding:24px;margin-bottom:16px;backdrop-filter:blur(16px);
}
.q-label{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.q-text{font-size:18px;font-weight:600;line-height:1.5;margin-bottom:20px;}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.q-opt{
  background:rgba(34,34,34,.8);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:14px 10px;font-size:13px;font-weight:500;cursor:pointer;text-align:center;
  transition:all .2s;user-select:none;line-height:1.3;backdrop-filter:blur(6px);
}
.q-opt:hover:not(.locked){border-color:rgba(240,165,0,.5);background:rgba(26,18,0,.8);transform:translateY(-1px);}
.q-opt.locked{pointer-events:none;}
.q-opt.correct{border-color:var(--green)!important;background:var(--green-dim)!important;color:var(--green)!important;font-weight:700;}
.q-opt.wrong{border-color:var(--red)!important;background:var(--red-dim)!important;color:#FF7070!important;font-weight:700;}

/* ── TIMER BAR ── */
.timer-wrap{margin-bottom:16px;}
.timer-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.timer-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;}
.timer-count{font-family:var(--font-display);font-size:28px;color:var(--gold);line-height:1;transition:color .3s;}
.timer-count.urgent{color:var(--red);animation:urgentPulse .4s infinite;}
@keyframes urgentPulse{0%,100%{opacity:1;}50%{opacity:.6;}}
.timer-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.timer-fill{height:100%;border-radius:3px;transition:width .1s linear,background .5s;}

/* ── RESULT OVERLAY ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.92);
  display:flex;align-items:center;justify-content:center;
  z-index:300;padding:20px;animation:overlayIn .25s var(--ease-out);
  backdrop-filter:blur(8px);
}
.overlay.hidden{display:none;}
@keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
.result-box{
  background:rgba(24,24,24,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-radius:var(--radius-xl);padding:32px 28px;
  text-align:center;max-width:360px;width:100%;border:2px solid;
  animation:boxIn .35s var(--ease-bounce);
}
@keyframes boxIn{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.result-box.win{border-color:var(--gold);box-shadow:var(--shadow-gold);}
.result-box.lose{border-color:var(--red);box-shadow:var(--shadow-red);}
.result-emoji{font-size:64px;margin-bottom:12px;display:block;}
.result-title{font-family:var(--font-display);font-size:36px;letter-spacing:2px;margin-bottom:8px;}
.result-msg{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:18px;}
.result-amount{font-size:28px;font-weight:800;margin-bottom:6px;}
.result-sub{font-size:12px;color:var(--muted);margin-bottom:22px;}

/* ── AD BANNER (V3.1 Modo Educativo) ── */
.ad-banner{
  background:linear-gradient(135deg,rgba(0,30,10,.9),rgba(0,50,20,.9));
  border:1px solid rgba(0,201,127,.4);border-radius:var(--radius);
  padding:20px;margin-bottom:14px;text-align:center;
  backdrop-filter:blur(12px);animation:adIn .4s var(--ease-bounce);
}
@keyframes adIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.ad-banner .ad-tag{font-size:9px;color:var(--green);font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.ad-banner .ad-title{font-family:var(--font-display);font-size:26px;color:var(--white);letter-spacing:2px;margin-bottom:6px;}
.ad-banner .ad-sub{font-size:12px;color:rgba(245,245,240,.7);line-height:1.6;margin-bottom:14px;}
.ad-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.ad-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow));border-radius:2px;transition:width .1s linear;}
.ad-timer{font-size:11px;color:var(--muted);}

/* ── RANK ── */
.rank-item{
  display:flex;align-items:center;gap:12px;padding:13px;
  background:rgba(24,24,24,.8);border-radius:var(--radius-sm);margin-bottom:8px;
  border:1px solid var(--border);transition:border-color .2s;backdrop-filter:blur(8px);
}
.rank-item:hover{border-color:rgba(240,165,0,.2);}
.rank-pos{font-family:var(--font-display);font-size:22px;width:30px;text-align:center;flex-shrink:0;}
.rank-pos.gold-c{color:var(--yellow);}
.rank-pos.silver-c{color:#AAA;}
.rank-pos.bronze-c{color:#CD7F32;}
.rank-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;}
.rank-info{flex:1;min-width:0;}
.rank-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-detail{font-size:11px;color:var(--muted);}
.rank-score{font-weight:700;color:var(--gold);font-size:13px;flex-shrink:0;text-align:right;}

/* ── LUMA AVATAR ── */
.luma-avatar{
  width:70px;height:70px;border-radius:50%;
  background:linear-gradient(135deg,var(--red),var(--gold));
  display:flex;align-items:center;justify-content:center;font-size:32px;
  margin:0 auto 12px;border:2px solid var(--gold);box-shadow:var(--shadow-gold);
}
.chat-bubble{
  background:rgba(34,34,34,.85);border-radius:4px 16px 16px 16px;

/* ─── CONFETTI ─── */
(function(){
  const canvas=$('confetti-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let particles=[];
  let raf=null;

  function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
  }
  window.addEventListener('resize',resize);
  resize();

  window.fireConfetti=function(){
    particles=[];
    const cols=['#FFD700','#F0A500','#00C97F','#CC1A1A','#FFFFFF'];
    for(let i=0;i<120;i++){
      particles.push({
        x:Math.random()*canvas.width, y:-10,
        vx:(Math.random()-0.5)*4, vy:Math.random()*5+3,
        color:cols[Math.floor(Math.random()*cols.length)],
        size:Math.random()*8+4, rot:Math.random()*360,
        vrot:(Math.random()-0.5)*6, alpha:1,
      });
    }
    cancelAnimationFrame(raf);
    (function loop(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles=particles.filter(p=>p.alpha>0.01);
      particles.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.rot+=p.vrot; p.vy+=0.1; p.alpha-=0.012;
        ctx.save();
        ctx.globalAlpha=p.alpha;
        ctx.translate(p.x,p.y);
        ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle=p.color;
        ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.5);
        ctx.restore();
      });
      if(particles.length){ raf=requestAnimationFrame(loop); }
      else { ctx.clearRect(0,0,canvas.width,canvas.height); }
    })();
  };
})();

/* ─── TIMER ─── */
const Timer={
  _t:null,_ms:0,_cb:null,_tickCb:null,
  start(ms,onDone,onTick){
    this.stop();
    this._ms=ms; this._cb=onDone; this._tickCb=onTick;
    const step=()=>{
      this._ms-=100;
      if(this._tickCb)this._tickCb(this._ms);
      if(this._ms<=0){ this.stop(); if(this._cb)this._cb(); }
      else { this._t=setTimeout(step,100); }
    };
    this._t=setTimeout(step,100);
  },
  stop(){ clearTimeout(this._t); this._t=null; },
};

  }catch(e){

/* ─── LOGIN ─── */
function showLogin(){
  let mode='login';
  function draw(){
    $('app').innerHTML=`
    <div class="screen active" style="display:flex;flex-direction:column;height:100dvh;justify-content:center;padding:32px 20px;overflow-y:auto;touch-action:pan-y !important;-webkit-overflow-scrolling:touch !important;">
      <div style="text-align:center;margin-bottom:32px;">
        <div style="font-family:var(--font-display);font-size:72px;letter-spacing:8px;background:linear-gradient(135deg,#FFD700,#F0A500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Aluna</div>
        <div style="font-size:12px;color:var(--muted);">O teu conhecimento tem valor real</div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:22px;">
        <button class="btn ${mode==='login'?'btn-gold':'btn-ghost'}" id="mode-login">Entrar</button>
        <button class="btn ${mode==='register'?'btn-gold':'btn-ghost'}" id="mode-reg">Criar Conta</button>
      </div>
      ${mode==='login'?`
      <div class="card">
        <div class="field"><label class="field-label">E-mail</label><input class="field-input" id="l-email" type="email" placeholder="teu@email.com"/></div>
        <div class="field"><label class="field-label">Senha</label><input class="field-input" id="l-pass" type="password" placeholder="••••••••"/></div>
        <button class="btn btn-gold glow-pulse" id="do-login" style="margin-top:6px;">Entrar na Aluna</button>
      </div>`:`
      <div class="card" style="overflow-y:auto;max-height:65dvh;">
        <div class="field"><label class="field-label">Nome Completo</label><input class="field-input" id="r-name" placeholder="Teu nome"/></div>
        <div class="field"><label class="field-label">E-mail</label><input class="field-input" id="r-email" type="email" placeholder="teu@email.com"/></div>
        <div class="field"><label class="field-label">Contacto</label><input class="field-input" id="r-phone" type="tel" placeholder="9XX XXX XXX"/></div>
        <div class="field"><label class="field-label">Província</label><select class="field-input" id="r-prov">${PROVINCES.map(p=>`<option>${p}</option>`).join('')}</select></div>
        <div class="field"><label class="field-label">Nível de Ensino</label><select class="field-input" id="r-edu">${EDU_LEVELS.map(l=>`<option>${l}</option>`).join('')}</select></div>
        <div class="field"><label class="field-label">Senha</label><input class="field-input" id="r-pass" type="password" placeholder="Mínimo 6 caracteres"/></div>
        <button class="btn btn-gold glow-pulse" id="do-reg" style="margin-top:6px;">🚀 Criar Conta</button>
      </div>`}
      <div style="text-align:center;font-size:11px;color:var(--muted);margin-top:14px;">💡 Cada 5 convites válidos = <strong style="color:var(--gold);">200 Kz em tokens</strong></div>
    </div>`;
    $('mode-login').onclick=()=>{mode='login';draw();};
    $('mode-reg').onclick=()=>{mode='register';draw();};
    if(mode==='login'){
      const doL=()=>{
        const e=$('l-email').value.trim(), p=$('l-pass').value.trim();
        if(!e||!p)return toast('⚠️ Preenche todos os campos');
        S.user={name:'Kizua Mbemba',email:e,province:'Luanda',level:'12ª Classe',balance:1500,tokens:2,invites:2,inviteCode:'ALUNA-K7X2',wins:3,losses:1};
        toast('🎉 Bem-vindo à Aluna!');
        const savedTab=loadTab();
        render(savedTab);
      };
      $('do-login').onclick=doL;
      $('l-pass').onkeydown=e=>{ if(e.key==='Enter')doL(); };
    } else {
      $('do-reg').onclick=()=>{
        const n=$('r-name').value.trim(), e=$('r-email').value.trim(),
              ph=$('r-phone').value.trim(), p=$('r-pass').value.trim();
        if(!n||!e||!ph||!p)return toast('⚠️ Preenche todos os campos');
        if(p.length<6)return toast('⚠️ Senha mínima: 6 caracteres');
        S.user={name:n,email:e,province:$('r-prov').value,level:$('r-edu').value,
          balance:200,tokens:0,invites:0,
          inviteCode:'ALUNA-'+Math.random().toString(36).slice(2,6).toUpperCase(),
          wins:0,losses:0};
        toast('🚀 Conta criada com sucesso!');
        render('inicio');
      };
    }
  }
  draw();
}

/* ─── HOME ─── */
function buildHome(){
  const u=S.user;
  const progress=((u.invites%5)/5)*100;
  const winRate=u.wins+u.losses>0?Math.round(u.wins/(u.wins+u.losses)*100):0;
  return `
  <div class="hero">
    <div style="font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;">Bem-vindo,</div>
    <div class="hero-name">${u.name.split(' ')[0]}</div>
    <div class="hero-sub">${u.province} · ${u.level}</div>
    <div class="hero-badge">🇦🇴 Jogador Aluna</div>
  </div>
  <div class="stats-grid stats-grid-3">
    <div class="stat-box"><div class="stat-val">${fmt(u.balance)}</div><div class="stat-label">Kz Saldo</div></div>
    <div class="stat-box"><div class="stat-val">${u.wins}</div><div class="stat-label">Vitórias</div></div>
    <div class="stat-box"><div class="stat-val">${u.tokens}</div><div class="stat-label">Tokens</div></div>
  </div>
  <div class="card card-gold">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div class="sec-title">Jogar Agora</div>
      <span class="badge badge-gold">🔴 AO VIVO</span>
    </div>
    <button class="btn btn-gold" id="go-luma" style="margin-bottom:10px;">🤖 Jogar com Luma IA</button>
    <button class="btn btn-red" id="go-battle">⚔️ Batalhar com Jogadores</button>
  </div>
  <div class="invite-box">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-weight:700;font-size:14px;margin-bottom:2px;">🔗 Teu Link de Convite</div>
        <div style="font-size:11px;color:var(--muted);">Cada 5 amigos = 200 Kz</div>
      </div>
      <span class="badge badge-gold">${u.invites} convite${u.invites!==1?'s':''}</span>
    </div>
    <div class="invite-code" id="invite-code">${u.inviteCode}</div>
    <div class="prog-bar"><div class="prog-fill" style="width:${progress}%;"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);">
      <span>${u.invites%5}/5 para próximo bónus</span>
      <span style="color:var(--gold);">+200 Kz</span>
    </div>
  </div>
  <div class="card" style="background:linear-gradient(135deg,rgba(10,26,10,.9),rgba(24,24,24,.9));">
    <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;">📊 Estatísticas</div>
    <div class="stats-grid stats-grid-2" style="margin-bottom:10px;">
      <div style="text-align:center;"><div style="font-size:32px;font-weight:800;color:var(--green);">${u.wins}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;">Vitórias</div></div>
      <div style="text-align:center;"><div style="font-size:32px;font-weight:800;color:var(--red);">${u.losses}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;">Derrotas</div></div>
    </div>
    <div style="height:1px;background:var(--border);margin-bottom:10px;"></div>
    <div style="text-align:center;"><div style="font-size:10px;color:var(--muted);">Taxa de Vitórias</div><div style="font-size:36px;font-weight:800;color:var(--gold);">${winRate}%</div></div>
  </div>`;
}

function attachHomeEvents(){
  $('go-luma').onclick=()=>render('luma');
  $('go-battle').onclick=()=>render('real');
  $('invite-code').onclick=()=>{
    const link=`https://aluna.ao/convite/${S.user.inviteCode}`;
    if(navigator.clipboard){ navigator.clipboard.writeText(link).catch(()=>{}); }
    toast('🔗 Link copiado! Partilha com os teus amigos.');
    $('invite-code').textContent='✅ Copiado!';
    setTimeout(()=>{ const el=$('invite-code'); if(el)el.textContent=S.user.inviteCode; },2000);
  };
}

/* ─── LUMA ─── */
function buildLuma(){
  const L=S.luma;
  if(L.phase==='lobby')    return buildLumaLobby();
  if(L.phase==='question') return buildLumaQuestion();
  return '';
}

function lumaAnswer(idx){
  if(S.luma.locked)return;
  S.luma.locked=true;
  Timer.stop();
  const q=QUESTIONS[S.luma.qIdx%QUESTIONS.length];
  S.luma.selected=idx;
  const win=idx===q.a;
  S.luma.correct=win;
  S.luma.msg=win?rnd(WIN_MSGS):rnd(LOSE_MSGS);

  if(!S.lumaDidUpdateRef&&S.luma.bet>0){
    S.lumaDidUpdateRef=true;
    S.user.balance=win?S.user.balance+S.luma.bet:S.user.balance-S.luma.bet;
    S.user.wins+=win?1:0;
    S.user.losses+=win?0:1;

function battleAnswer(idx){
  if(S.battle.locked)return;
  S.battle.locked=true;
  Timer.stop();

  /* V3.1 — Registo de tempo de resposta em ms para desempate */
  const responseMs=Date.now()-S.questionStartMs;
  S.battle.answerTimeMs=(S.battle.answerTimeMs||0)+responseMs;

  const q=QUESTIONS[S.battle.qIdx%QUESTIONS.length];
  S.battle.selected=idx;
  if(idx===q.a){ S.scoreRef++; S.battle.score=S.scoreRef; }

  /* re-render para mostrar correcto/errado */
  render('real');
  attachBattleQuestionEvents();

  setTimeout(()=>{
    if(S.battle.qIdx>=4){
      const finalScore=S.scoreRef;
      const maxP=S.battle.roomSize||20;

      /* V3.1 — Desempate por precisão: 1º mais acertos, 2º mais rápido */
      /* Simulação: adversário fictício com 4 acertos e tempo aleatório */
      const opponentScore=4;
      const opponentTimeMs=Math.floor(Math.random()*15000+8000);
      let isWinner=false;
      if(finalScore>opponentScore){ isWinner=true; }
      else if(finalScore===opponentScore){ isWinner=S.battle.answerTimeMs<opponentTimeMs; }
      else { isWinner=false; }

      const totalPool=maxP*S.battle.bet;
      const prize=Math.round(totalPool*(1-PLATFORM_FEE));
      if(S.battle.bet>0&&!S.didPayRef){
        S.didPayRef=true;
        if(isWinner) S.user.balance+=prize-S.battle.bet;
        else S.user.balance-=S.battle.bet;
        if(isWinner) S.user.wins++; else S.user.losses++;
      }
      S.battle.result={isWinner,prize,bet:S.battle.bet,finalScore,responseMs:S.battle.answerTimeMs};

      /* ══ PROTOCOLO V5.8: RETRATAÇÃO DE DERROTA ══ */
      if(!isWinner){ S.battle.result.allLost = (finalScore < opponentScore); }

      showBattleResult();
    } else {
      S.battle.qIdx++;
      S.battle.selected=null;
      S.battle.locked=false;
      render('real');
      attachBattleQuestionEvents();
      startBattleTimer();
    }
  },1000);
}

function showBattleResult(){
  const r=S.battle.result;
  const rb=$('result-box');
  if(!rb)return;
  rb.className='result-box '+(r.isWinner?'win':'lose');
  $('res-emoji').textContent=r.isWinner?'🥇':'😔';
  $('res-title').textContent=r.isWinner?'VENCEDOR!':'SEM PRÉMIO';
  $('res-title').style.color=r.isWinner?'var(--gold)':'var(--red)';
  $('res-msg').textContent=r.isWinner?'Parabéns! O teu conhecimento é superior!'+

  if(r.bet>0){

  $('res-btn').textContent='🔄 Nova Batalha';
  $('res-btn').onclick=()=>{

function attachWalletEvents(){
  if(walletView==='main'){
    const dep=$('w-dep'); if(dep) dep.onclick=()=>{ walletView='deposit'; renderTab('carteira'); };
    const wd=$('w-wd');   if(wd)  wd.onclick=()=>{ walletView='withdraw'; renderTab('carteira'); };
  } else {
    const back=$('w-back'); if(back) back.onclick=()=>{ walletView='main'; renderTab('carteira'); };
    if(walletView==='deposit'){
      const conf=$('w-dep-confirm');
      if(conf) conf.onclick=()=>{
        const v=parseInt($('w-dep-amt')?.value||'0');
        if(!v||v<=0) return toast('⚠️ Indica um valor válido');
        const m=$('w-method')?.value||'Multicaixa Express';
        const wa=`https://wa.me/244937876711?text=${encodeURIComponent('Depósito Aluna\nMétodo: '+m+'\nValor: '+fmt(v)+' Kz\nUtilizador: '+S.user.name+'\n\n[Comprovativo em anexo]')}`;
        toast('📲 A abrir WhatsApp...');
        setTimeout(()=>window.open(wa,'_blank'),600);
        walletView='main'; renderTab('carteira');
      };
    } else {
      const wconf=$('wd-confirm');
      if(wconf) wconf.onclick=()=>{
        const n=$('wd-name')?.value.trim(), num=$('wd-num')?.value.trim(), v=parseInt($('wd-amt')?.value||'0');
        if(!n||!num||!v) return toast('⚠️ Preenche todos os campos');
        if(v<1500) return toast('⚠️ Mínimo: 1.500 Kz');
        if(v>S.user.balance) return toast('⚠️ Saldo insuficiente');
        S.admin.withdrawals.unshift({user:S.user.name,amount:v,method:'Multicaixa',number:num,status:'Pendente',date:new Date().toISOString().slice(0,10)});
        toast('✅ Pedido enviado! Processamento em 24-48h.');
        walletView='main'; renderTab('carteira');
      };
    }
  }
}

function attachOracleEvents(){
  const oracleBtn=$('oracle-gen');
  if(!oracleBtn)return;
  oracleBtn.addEventListener('click',async()=>{
    oracleBtn.disabled=true;
    oracleBtn.textContent='⏳ A gerar...';
    const apiKey=S.admin.apiKeys.gemini;
    if(!apiKey){ toast('⚠️ Chave Gemini não configurada'); oracleBtn.disabled=false; oracleBtn.textContent='🤖 Gerar Perguntas com IA'; return; }
    const prompt=`${$('oracle-prompt').value}\nCategoria: ${$('oracle-cat').value}, Dificuldade: ${$('oracle-diff').value}.\nResponde APENAS com JSON válido: [{"q":"...","opts":["A","B","C","D"],"a":0},...]`;
    try{
      const resp=await safeApiCall(()=>fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      }));
      const data=await resp.json();
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'[]';
      const clean=text.replace(/```json|```/g,'').trim();
      const qs=JSON.parse(clean);
      const listEl=$('oracle-q-list');
      const resultEl=$('oracle-result');
      if(listEl&&resultEl){
        resultEl.style.display='block';
        listEl.innerHTML=qs.map((q,i)=>`
        <div style="margin-bottom:12px;padding:12px;background:var(--surface3);border-radius:8px;">
          <div style="font-size:13px;font-weight:600;margin-bottom:6px;">${q.q}</div>

            ${q.opts.map((o,j)=>`<span class="badge ${j===q.a?'badge-green':'badge-gold'}">${j===q.a?'✓ ':''}${o}</span>`).join('')}
          </div>
          <button class="btn btn-green btn-sm" onclick="S.admin.questions.push(${JSON.stringify(q).replace(/'/g,'\\x27')});toast('✅ Adicionada!');this.disabled=true;this.textContent='✅ Adicionada';">Adicionar ao Banco</button>
        </div>`).join('');
      }
      toast('✅ '+qs.length+' perguntas geradas!');
    }catch(e){
      toast('❌ Erro: '+(e.message==='timeout'?'Tempo esgotado (8s). Verifica a ligação.':e.message));
    }
    oracleBtn.disabled=false;
    oracleBtn.textContent='🤖 Gerar Perguntas com IA';
  });
}

/* ═══════════════════════════════════════════════
   BOOT SYSTEM — ARRANQUE SEGURO V4.0
   Bootstrap blindado com fail-safe e anti-tela preta
═══════════════════════════════════════════════ */

/* Remove o skeleton CSS e transfere controlo ao JS */
function _removeSkeleton(){
  const sk=document.getElementById('app-skeleton');
  if(!sk)return;
  sk.classList.add('fade-out');
  setTimeout(()=>{ if(sk.parentNode)sk.parentNode.removeChild(sk); },420);
}

function alunaInit(){
  console.log('SISTEMA ATIVO'); /* V4.0 — marcador de arranque */

  /* ─── FLAG TRIGGER — apenas decorativo (acesso removido) ─── */
  /* A bandeira 🇦🇴 permanece visível mas sem função de acesso admin */

  /* ─── ADMIN LOGIN ─── */
  const doAdminLogin=()=>{
    const inp=$('admin-pw-input');
    if(!inp)return;
    const pw=inp.value;
    if(pw===ADMIN_SECRET){
      hideOverlay('overlay-admin-login');
      inp.value='';
      S.admin.open=true;
      Timer.stop();
      clearInterval(S.battleIntervalRef);
      renderAdmin();
    } else {
      toast('❌ Senha incorrecta');
      inp.value='';
    }
  };

  const okBtn=$('admin-pw-ok');
  const pwInp=$('admin-pw-input');
  const cancelBtn=$('admin-pw-cancel');
  if(okBtn)     okBtn.onclick=doAdminLogin;
  if(pwInp)     pwInp.onkeydown=e=>{ if(e.key==='Enter')doAdminLogin(); };
  if(cancelBtn) cancelBtn.onclick=()=>{
    hideOverlay('overlay-admin-login');
    const inp=$('admin-pw-input');
    if(inp) inp.value='';
  };

  /* ─── SPLASH + FAIL-SAFE ─── */
  /* Se o showSplash() falhar por qualquer razão,
     o fail-safe remove o skeleton e carrega o Login directamente */
  try{
    showSplash();
    /* showSplash chama setTimeout→showLogin internamente,
       por isso o skeleton é removido logo que o #app é preenchido */
  }catch(e){
    console.error('[Aluna V4.0] Boot crash — activando Fail-safe:',e);
    /* FAIL-SAFE: remove skeleton e carrega Login por defeito */
    _removeSkeleton();
    try{
      showLogin();
    }catch(e2){
      console.error('[Aluna V4.0] Fail-safe crash:',e2);
      /* Último recurso: mensagem de erro visível */
      const app=$('app');
      if(app) app.innerHTML=
        '<div style="display:flex;flex-direction:column;align-items:center;'
        +'justify-content:center;height:100dvh;background:#0A0A0A;'
        +'color:#FFD700;font-family:sans-serif;text-align:center;padding:32px;">'
        +'<div style="font-size:60px;margin-bottom:16px;">⚠️</div>'
        +'<div style="font-size:20px;font-weight:700;margin-bottom:8px;">Erro de arranque</div>'
        +'<div style="font-size:12px;color:#666;margin-bottom:24px;max-width:300px;">'+e.message+'</div>'
        +'<button onclick="location.reload()" style="background:#F0A500;color:#000;'
        +'border:none;padding:14px 32px;border-radius:8px;font-size:15px;'
        +'font-weight:800;cursor:pointer;letter-spacing:1px;">🔄 RECARREGAR</button>'
        +'</div>';
    }
  }
}

/* ─── ARRANQUE ─── */
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',alunaInit);
}else{
  alunaInit();
}

/* ═══════════════════════════════════════════════
   PROTOCOL: JS INTERCEPTION — SCROLL LOCK FIX
   Bloqueia touchmove fora da .scroll-area,
   permite 100% de fluidez dentro dela.
═══════════════════════════════════════════════ */
(function installTouchGuard(){
  function isInsideScrollArea(el){
    while(el){
      if(el.classList && el.classList.contains('scroll-area')) return true;
      /* Liberta o scroll do painel de administração */
      if(el.id === 'admin-content') return true;
      el=el.parentElement;
    }
    return false;
  }

  /* Regista com passive:false para poder chamar preventDefault() */
  document.addEventListener('touchmove', function(e){
    /* Permite toque em overlays (admin/resultado) — têm overflow próprio */
    if(e.target.closest && e.target.closest('.overlay')) return;
    /* Permite dentro da zona de scroll principal e do admin-content */
    if(isInsideScrollArea(e.target)) return;
    /* Bloqueia qualquer outro movimento que possa mover a página */
    e.preventDefault();
  }, { passive: false });

  /* Garante que o toque inicial nunca arrasta a página base */
  document.addEventListener('touchstart', function(e){
    if(e.target.closest && e.target.closest('.overlay')) return;
    if(isInsideScrollArea(e.target)) return;
    /* Não chama preventDefault aqui para manter interactividade dos botões */
  }, { passive: true });
})();
</script>
